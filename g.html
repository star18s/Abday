<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:black;
    color:white;
    overflow-x:hidden;
}

/* INTRO */
#intro{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}
#intro button{
    padding:15px 30px;
    background:#ff4081;
    border:none;
    border-radius:30px;
    color:white;
    cursor:pointer;
}

/* MAIN */
#main{ display:none; }

/* HERO */
.hero{
    height:90vh;
    background:url('main.jpg') center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

/* BUTTON */
.btn{
    margin-top:15px;
    padding:12px 25px;
    background:#ff4081;
    border:none;
    border-radius:25px;
    color:white;
    cursor:pointer;
}

/* TYPE TEXT */
#type{
    margin-top:10px;
}

/* TITLE SPACING */
h2{
    margin-top:10px;
    margin-bottom:5px;
    text-align:center;
}

/* GRID GALLERY */
.gallery{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    padding:15px;
}
.gallery img{
    width:100%;
    height:160px;
    object-fit:cover;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
}
.gallery img:hover{
    transform:scale(1.05);
}

/* LAST IMAGE FULL WIDTH */
.gallery img:last-child{
    grid-column:span 2;
}

/* POPUP */
#popup{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background:black;
    justify-content:center;
    align-items:center;
    z-index:999;
}
#popup img{
    max-width:90%;
    max-height:90%;
    border-radius:15px;
}

/* SURPRISE */
.surprise{
    position:fixed;
    width:100%;
    height:0;
    top:0;
    left:0;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    transition:1s;
}
.surprise.active{ height:100%; }

/* BLINK BG */
.blink-bg img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    animation:blink 5s infinite;
}
@keyframes blink{
    0%{opacity:0;}
    30%{opacity:1;}
    60%{opacity:0;}
}

/* EMOJI */
.emoji{
    position:absolute;
    animation:floatUp linear forwards;
}
@keyframes floatUp{
    0%{transform:translateY(0);opacity:1;}
    100%{transform:translateY(-100vh);opacity:0;}
}

/* MOBILE OPTIMIZATION */
@media (max-width:600px){

    .hero h1{
        font-size:2rem;
    }

    #type{
        font-size:0.9rem;
        padding:0 10px;
    }

    .btn{
        padding:10px 20px;
        font-size:0.9rem;
    }

    .gallery img{
        height:140px;
    }

    /* optional: single column */
    /* .gallery{ grid-template-columns:1fr; } */
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <h1>🎬 A Special Surprise</h1>
    <button onclick="startSite()">Enter</button>
</div>

<!-- MAIN -->
<div id="main">

<audio id="music" loop>
<source src="music.mp3">
</audio>

<div class="hero">
    <h1>Happy Birthday 💖</h1>
    <div id="type"></div>
    <button class="btn" onclick="showSurprise()">Surprise 🎁</button>
</div>
<h2>Our Memories 📸</h2>

<div class="gallery">
    <img src="1.jpg">
    <img src="2.jpg">
    <img src="3.jpg">
    <img src="4.jpg">
    <img src="5.jpg">
    <img src="6.jpg">
    <img src="7.jpg">
</div>

<!-- POPUP -->
<div id="popup" onclick="closePopup()">
    <img id="popupImg">
</div>

<!-- SURPRISE -->
<div class="surprise" id="surprise">
    <div class="blink-bg">
        <img src="1.jpg">
        <img src="2.jpg">
        <img src="3.jpg">
    </div>
    <h2>🎉 Surprise 🎉</h2>
    <p>You are my best friend ❤️</p>
</div>

</div>

<script>
// START
function startSite(){
    document.getElementById("intro").style.display="none";
    document.getElementById("main").style.display="block";
    document.getElementById("music").play();
    typeText();
}

// TYPE EFFECT
let text="You are the best part of my life 💖";
let i=0;
function typeText(){
    if(i<text.length){
        document.getElementById("type").innerHTML+=text.charAt(i);
        i++;
        setTimeout(typeText,50);
    }
}

// POPUP
document.querySelectorAll(".gallery img").forEach(img=>{
    img.addEventListener("click",()=>{
        document.getElementById("popup").style.display="flex";
        document.getElementById("popupImg").src=img.src;
    });
});
function closePopup(){
    document.getElementById("popup").style.display="none";
}

// SURPRISE
function showSurprise(){
    document.getElementById("surprise").classList.add("active");
    startEmojis();
    confetti();
}

// EMOJIS
function startEmojis(){
    setInterval(()=>{
        let e=document.createElement("div");
        e.className="emoji";
        e.innerText=["💖","🎉","✨","🥳"][Math.floor(Math.random()*4)];
        e.style.left=Math.random()*100+"vw";
        e.style.fontSize=(20+Math.random()*20)+"px";
        e.style.animationDuration=(3+Math.random()*3)+"s";
        document.body.appendChild(e);
        setTimeout(()=>e.remove(),5000);
    },300);
}

// CONFETTI
function confetti(){
    for(let i=0;i<40;i++){
        let c=document.createElement("div");
        c.style.position="absolute";
        c.style.width="6px";
        c.style.height="6px";
        c.style.background="white";
        c.style.left=Math.random()*100+"vw";
        c.style.top="50%";
        c.style.animation="floatUp 3s linear";
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
    }
}
</script>

</body>
</html>
